<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spxplorer</title>
  <style>

    .page-shell { width: 100%; max-width: 720px; padding: 24px; }
    .hero-card { background: linear-gradient(to bottom, #6aabc5 0%, #87CEEB 100%); box-shadow: 0 0 20px rgba(0,0,0,0.3); border-radius: 12px; padding: 32px; text-align: center; color: #fff; }
    .title { margin: 0 0 8px; font-size: 40px; }
    .subtitle { margin: 0 0 24px; font-size: 18px; opacity: 0.9; }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .action-link { display: inline-block; background-color: #e60012; color: #fff; border: none; border-radius: 8px; padding: 12px 18px; text-decoration: none; font-size: 16px; cursor: pointer; }
    .action-link:hover { background-color: #c5000f; }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="hero-card" aria-labelledby="spxplorer-title">
      <h1 id="spxplorer-title" class="title">Spxplorer</h1>
      <p class="subtitle">Explore this project and jump into the game.</p>
      <div class="actions">
        <a class="action-link" href="Flappy%20Birdie.html">Play Mario Flappy Bird</a>
        <a class="action-link" href="index.html">Go to Index</a>
